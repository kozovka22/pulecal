security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: Pulecal\Service\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api_login:
            pattern: ^/api/auth/login$
            security: false
        api:
            pattern: ^/api/
            stateless: true
            provider: app_user_provider
            custom_authenticators:
                - Pulecal\Service\Security\ApiKeyAuthenticator
                - Pulecal\Service\Security\JwtAuthenticator
        calendar:
            pattern: ^/calendar/
            security: false
        main:
            pattern: ^/(login|login_check)?/?(admin/)?
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: login
                check_path: login_check
                username_parameter: form[username]
                password_parameter: form[password]
            logout:
                path: logout
                target: login

    access_control:
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/admin/, roles: [ROLE_USER, ROLE_ADMIN, ROLE_ROOT] }
        - { path: ^/api/, roles: [ROLE_USER, ROLE_ADMIN, ROLE_ROOT] }
        - { path: ^/api/user, roles: [ROLE_ROOT, ROLE_ADMIN] }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
